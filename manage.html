<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Price List</title>
  <meta name="description" content="Manage and publish Mobile Hub price lists.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f8ff;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --text: #162033;
      --muted: #5f6f8a;
      --line: #dde6f5;
      --primary: #0f6dff;
      --primary-2: #0ea4a0;
      --danger: #d83955;
      --warning: #f59e0b;
      --success: #0b8a67;
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow-lg: 0 24px 45px rgba(10, 29, 65, 0.14);
      --shadow-md: 0 12px 24px rgba(13, 39, 86, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: radial-gradient(circle at 12% 14%, #d8e8ff 0%, transparent 42%),
        radial-gradient(circle at 86% 20%, #d8fff6 0%, transparent 38%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    .page-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .bg-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(5px);
      opacity: 0.5;
    }

    .orb-a {
      width: min(44vw, 520px);
      height: min(44vw, 520px);
      top: -170px;
      left: -140px;
      background: radial-gradient(circle, #a7c8ff 0%, transparent 68%);
    }

    .orb-b {
      width: min(38vw, 420px);
      height: min(38vw, 420px);
      top: 32%;
      right: -120px;
      background: radial-gradient(circle, #b9f5e8 0%, transparent 70%);
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(to right, rgba(19, 75, 160, 0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(19, 75, 160, 0.06) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at 50% 30%, black 35%, transparent 80%);
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      background: var(--surface);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .head {
      padding: clamp(24px, 3vw, 38px);
      background: linear-gradient(132deg, #0f6dff 0%, #0b78ca 42%, #0ea4a0 100%);
      color: #fff;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
    }

    .head-copy {
      max-width: 820px;
    }

    .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.76rem;
      opacity: 0.88;
      margin: 0 0 12px;
    }

    .head h1 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 4.2vw, 3rem);
      line-height: 1.03;
      letter-spacing: -0.02em;
    }

    .head p {
      margin: 10px 0 0;
      opacity: 0.95;
      font-size: clamp(0.95rem, 2vw, 1.02rem);
      line-height: 1.5;
    }

    .head-badge {
      min-width: 190px;
      align-self: center;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      backdrop-filter: blur(4px);
      text-align: center;
    }

    .head-badge span {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.82;
    }

    .head-badge strong {
      display: block;
      margin-top: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
    }

    .body {
      padding: clamp(18px, 2.8vw, 28px);
    }

    .panel {
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 18px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .grid > div {
      min-width: 0;
    }

    #newDate {
      max-width: 160px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      min-width: 0;
      border: 1px solid #c5d4ee;
      background: #f9fcff;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      color: var(--text);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15, 109, 255, 0.16);
      transform: translateY(-1px);
    }

    .actions {
      margin: 14px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: linear-gradient(135deg, #0f6dff 0%, #1995ff 100%);
      color: #fff;
      box-shadow: 0 8px 18px rgba(15, 109, 255, 0.24);
    }

    .secondary {
      background: #eef4ff;
      color: #244272;
      border: 1px solid #d8e5fb;
    }

    .status {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #dafaf2;
      border: 1px solid #b8f1e3;
      color: #0a624f;
      font-weight: 600;
      min-height: 46px;
    }

    .error {
      background: #fff0f3;
      border-color: #f6c7d0;
      color: #a61c3d;
    }

    .hint {
      margin: 8px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .brand-tools {
      margin-top: 16px;
      margin-bottom: 12px;
    }

    .brand-list {
      display: grid;
      gap: 16px;
    }

    .brand-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--surface-strong);
      box-shadow: var(--shadow-md);
    }

    .brand-card-header {
      background: linear-gradient(180deg, #fbfdff 0%, #f4f8ff 100%);
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid #e5eefb;
    }

    .brand-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      text-transform: capitalize;
      color: #153f7a;
      font-size: 1rem;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 880px;
    }

    th,
    td {
      border-top: 1px solid #eef2f8;
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #546e7a;
      background: #fafcff;
      font-family: 'Space Grotesk', sans-serif;
    }

    tbody tr:hover {
      background: #f7fbff;
    }

    .row-remove-btn {
      background: #fff0f3;
      color: #c62847;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      min-width: 78px;
    }

    .row-order-btn {
      background: #ebf3ff;
      color: #0f5cc7;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      min-width: 54px;
    }

    .row-action-group,
    .brand-action-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    .brand-action-group {
      width: 100%;
      justify-content: flex-end;
      flex-wrap: wrap;
      row-gap: 4px;
    }

    .serial-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 6px;
    }

    .serial-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .brand-serial-input {
      width: 86px;
      padding: 8px 8px;
      border: 1px solid #cfdcf4;
      border-radius: 6px;
      font-size: 13px;
    }

    .brand-serial-input.serial-invalid {
      border-color: #d32f2f;
      background: #ffebee;
    }

    .serial-error {
      width: 100%;
      margin-top: 4px;
      font-size: 12px;
      color: #b71c1c;
      text-align: right;
      min-height: 16px;
    }

    .display-config {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(260px, 1.5fr) repeat(2, minmax(110px, 0.5fr));
      gap: 8px;
      align-items: end;
      margin-top: 8px;
    }

    .display-field label {
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .display-field input {
      width: 100%;
      border: 1px solid #cfdcf4;
      border-radius: 6px;
      padding: 8px 8px;
      font-size: 13px;
      background: #fff;
    }

    .mini-btn {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      background: #eef4ff;
      color: #264777;
      border: 1px solid #d8e5fb;
    }

    .mini-order-btn {
      background: #e8eaf6;
      color: #1a237e;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(10, 19, 44, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 16px;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }

    .modal-head {
      background: linear-gradient(135deg, #0f6dff 0%, #0b78ca 100%);
      color: #fff;
      padding: 14px 16px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
    }

    .modal-body {
      padding: 16px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .danger-btn {
      background: linear-gradient(135deg, #d83955 0%, #e34c67 100%);
      color: #fff;
    }

    @media (max-width: 840px) {
      body {
        padding: 14px 10px;
      }

      .head {
        flex-direction: column;
        align-items: flex-start;
      }

      .head-badge {
        align-self: flex-start;
      }

      .body {
        padding: 14px;
      }

      .brand-action-group {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .serial-error {
        text-align: left;
      }

      .display-config {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="wrap">
    <div class="head">
      <div class="head-copy">
        <p class="eyebrow">Management Console</p>
        <h1>Price List Editor</h1>
        <p>Load the latest price list, update rows and brand display settings, then publish to a new date and time.</p>
      </div>
    </div>

    <div class="body">
      <div>
        <div class="panel">
          <div class="grid">
            <div>
              <label for="latestDate">Latest Date Found</label>
              <input id="latestDate" type="text" readonly>
            </div>
            <div>
              <label for="latestTime">Latest Time Found</label>
              <input id="latestTime" type="text" readonly>
            </div>
            <div>
              <label for="newDate">New Date</label>
              <input id="newDate" type="date">
            </div>
            <div>
              <label for="newTime">New Time (12-hour format)</label>
              <input id="newTime" type="text" value="08:00 AM" placeholder="08:00 AM">
            </div>
          </div>

          <div class="actions">
            <button id="loadBtn" class="secondary">Load Latest Data</button>
            <button id="publishBtn" class="primary">Publish New Date Data</button>
            <button id="deleteBtn" class="secondary">Delete Selected Date/Time</button>
          </div>

          <div class="brand-tools">
            <button id="addBrandBtn" class="secondary" type="button">Add Brand Section</button>
          </div>

          <div class="hint">Edit rows directly. Empty rows are ignored on publish.</div>
          <div id="status" class="status">Ready.</div>
        </div>

        <div id="brandContainer" class="brand-list"></div>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">Delete Price List Entry</div>
      <div class="modal-body">
        <div class="grid">
          <div>
            <label for="deleteDateSelect">Select Date</label>
            <select id="deleteDateSelect"></select>
          </div>
          <div>
            <label for="deleteTimeSelect">Select Time</label>
            <select id="deleteTimeSelect"></select>
          </div>
        </div>
        <div class="hint">This will permanently delete selected date/time data.</div>
        <div class="modal-actions">
          <button id="closeDeleteModalBtn" class="secondary" type="button">Cancel</button>
          <button id="confirmDeleteBtn" class="danger-btn" type="button">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const latestDateEl = document.getElementById('latestDate');
    const latestTimeEl = document.getElementById('latestTime');
    const newDateEl = document.getElementById('newDate');
    const newTimeEl = document.getElementById('newTime');
    const brandContainerEl = document.getElementById('brandContainer');
    const addBrandBtn = document.getElementById('addBrandBtn');
    const deleteModalEl = document.getElementById('deleteModal');
    const deleteDateSelectEl = document.getElementById('deleteDateSelect');
    const deleteTimeSelectEl = document.getElementById('deleteTimeSelect');
    const closeDeleteModalBtn = document.getElementById('closeDeleteModalBtn');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

    let lastSnapshotData = {};

    const defaultBrandDisplay = {
      iphone: { imageUrl: 'https://1000logos.net/wp-content/uploads/2017/02/iPhone-Logo-2007.png', width: 100, height: 50 },
      oneplus: { imageUrl: 'https://vectorjungal.com/files/preview/1280x410/11722283114xoutmijigzv6mfdtr2mgewmwimzyf98dsupch4lorzvzkskdxmtqaxcttxd1dphrih7glnokllt5zvo4quizhzt7kbuecsc2wlaj.png', width: 100, height: 40 },
      nothing: { imageUrl: 'https://nuraltech.com/wp-content/uploads/2023/05/Nothing-Logo.png', width: 120, height: 25 },
      moto: { imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/f/f9/Motorola_new_logo.svg', width: 100, height: 50 },
      iqoo: { imageUrl: 'https://wp.logos-download.com/wp-content/uploads/2024/01/IQOO_Logo.png?dl', width: 80, height: 20 },
      'ai+': { imageUrl: 'https://pbs.twimg.com/profile_images/1933392330763218950/t_7jGLCo_400x400.jpg', width: 40, height: 32 },
      tecno: { imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Tecno_Mobile_logo.svg/960px-Tecno_Mobile_logo.svg.png', width: 100, height: 20 },
      poco: { imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Poco_Smartphone_Company_logo.svg/960px-Poco_Smartphone_Company_logo.svg.png', width: 90, height: 50 },
      infinix: { imageUrl: 'https://cdn.worldvectorlogo.com/logos/infinix-1.svg', width: 90, height: 30 },
      oppo: { imageUrl: 'https://www.logo.wine/a/logo/Oppo/Oppo-Logo.wine.svg', width: 120, height: 50 },
      samsung: { imageUrl: 'https://1000logos.net/wp-content/uploads/2017/06/Font-Samsung-Logo.jpg', width: 100, height: 70 },
      vivo: { imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Vivo_logo_2019.svg/1280px-Vivo_logo_2019.svg.png', width: 100, height: 30 },
      realme: { imageUrl: 'https://upload.wikimedia.org/wikipedia/commons/9/91/Realme_logo.png', width: 100, height: 40 },
      narzo: { imageUrl: 'https://www.punjabnewsexpress.com/images/article/article241735.jpg', width: 100, height: 40 },
      redmi: { imageUrl: 'https://logodix.com/logo/914876.jpg', width: 120, height: 30 },
      nokia: { imageUrl: '', width: null, height: null },
      accessories: { imageUrl: '', width: null, height: null }
    };

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.className = isError ? 'status error' : 'status';
    }

    function convertTo24Hour(time12h) {
      const [time, modifier] = time12h.split(' ');
      if (!time || !modifier) return null;

      let [hours, minutes] = time.split(':');
      if (!hours || !minutes) return null;

      hours = parseInt(hours, 10);
      if (Number.isNaN(hours)) return null;

      if (hours === 12) {
        hours = 0;
      }
      if (modifier.toUpperCase() === 'PM') {
        hours += 12;
      }

      return String(hours).padStart(2, '0') + ':' + minutes;
    }

    function sortTimesDescending(times) {
      return times.slice().sort((a, b) => {
        const a24 = convertTo24Hour(a) || '00:00';
        const b24 = convertTo24Hour(b) || '00:00';
        return b24.localeCompare(a24);
      });
    }

    function getLatestDateKey(payload) {
      const keys = Object.keys(payload || {});
      return keys.sort().reverse()[0] || null;
    }

    function getLatestTimeKey(payload, dateKey) {
      const dateData = payload && payload[dateKey] ? payload[dateKey] : null;
      if (!dateData) return null;
      const times = Object.keys(dateData);
      return sortTimesDescending(times)[0] || null;
    }

    function isFirebaseConfigured() {
      if (!window.firebaseConfig) return false;
      const url = window.firebaseConfig.databaseURL || '';
      return Boolean(url) && !url.includes('YOUR_PROJECT_ID');
    }

    function normalizeNumber(value) {
      const trimmed = String(value || '').trim();
      if (!trimmed) return null;
      const num = Number(trimmed);
      return Number.isFinite(num) ? num : null;
    }

    function normalizePositiveInt(value) {
      const trimmed = String(value || '').trim();
      if (!trimmed) return null;
      if (!/^\d+$/.test(trimmed)) return null;
      const parsed = Number(trimmed);
      if (!Number.isInteger(parsed) || parsed <= 0) return null;
      return parsed;
    }

    function normalizeText(value) {
      return String(value || '').trim();
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function isRowEmpty(rowObj) {
      return !rowObj.model && !rowObj.ram_storage && !rowObj.color && rowObj.price === null && rowObj.online_price === null;
    }

    function buildRowHtml(item) {
      const stock = item && item.stock ? item.stock : 'In Stock';
      const price = item && item.price !== null && item.price !== undefined ? item.price : '';
      const onlinePrice = item && item.online_price !== null && item.online_price !== undefined ? item.online_price : '';

      return '<tr class="item-row">'
        + '<td><input data-field="model" type="text" value="' + escapeHtml(item && item.model ? String(item.model) : '') + '"></td>'
        + '<td><input data-field="ram_storage" type="text" value="' + escapeHtml(item && item.ram_storage ? String(item.ram_storage) : '') + '"></td>'
        + '<td><input data-field="color" type="text" value="' + escapeHtml(item && item.color ? String(item.color) : '') + '"></td>'
        + '<td><input data-field="price" type="number" value="' + price + '"></td>'
        + '<td><input data-field="online_price" type="number" value="' + onlinePrice + '"></td>'
        + '<td>'
        + '<select data-field="stock">'
        + '<option value="In Stock"' + (stock === 'In Stock' ? ' selected' : '') + '>In Stock</option>'
        + '<option value="Out Stock"' + (stock === 'Out Stock' ? ' selected' : '') + '>Out Stock</option>'
        + '</select>'
        + '</td>'
        + '<td><div class="row-action-group">'
        + '<button class="row-order-btn row-up-btn" type="button">Up</button> '
        + '<button class="row-order-btn row-down-btn" type="button">Down</button> '
        + '<button class="row-remove-btn" type="button">Remove</button>'
        + '</div></td>'
        + '</tr>';
    }

    function getBrandDisplayConfig(brand, metaDisplay) {
      const fromMeta = metaDisplay && typeof metaDisplay[brand] === 'object' ? metaDisplay[brand] : {};
      const fromDefault = defaultBrandDisplay[brand] || {};

      return {
        imageUrl: normalizeText(fromMeta.imageUrl || fromDefault.imageUrl || ''),
        width: normalizePositiveInt(fromMeta.width) || normalizePositiveInt(fromDefault.width),
        height: normalizePositiveInt(fromMeta.height) || normalizePositiveInt(fromDefault.height)
      };
    }

    function createBrandCard(brandName, items, serialNumber, displayConfig) {
      const card = document.createElement('section');
      card.className = 'brand-card';
      card.dataset.brand = brandName;

      const rows = (items && items.length ? items : [{}]).map(buildRowHtml).join('');

      const serialId = 'serial_' + brandName.toLowerCase().replace(/[^a-z0-9]+/g, '_');

      card.innerHTML = ''
        + '<div class="brand-card-header">'
        + '<div class="brand-title">' + escapeHtml(brandName) + '</div>'
        + '<div class="brand-action-group">'
        + '<div class="serial-wrap">'
        + '<label class="serial-label" for="' + serialId + '">Serial</label>'
        + '<input id="' + serialId + '" class="brand-serial-input" type="number" min="1" step="1" value="' + (serialNumber || '') + '" placeholder="e.g. 1">'
        + '</div>'
        + '<button class="mini-btn add-row-btn" type="button">Add Row</button> '
        + '<button class="mini-btn remove-brand-btn" type="button">Remove Brand</button>'
        + '</div>'
        + '<div class="display-config">'
        + '<div class="display-field">'
        + '<label>Brand Image URL (optional)</label>'
        + '<input class="brand-image-url" type="text" value="' + escapeHtml(displayConfig && displayConfig.imageUrl ? displayConfig.imageUrl : '') + '" placeholder="https://example.com/logo.png">'
        + '</div>'
        + '<div class="display-field">'
        + '<label>Image Width</label>'
        + '<input class="brand-image-width" type="number" min="1" step="1" value="' + (displayConfig && displayConfig.width ? displayConfig.width : '') + '" placeholder="100">'
        + '</div>'
        + '<div class="display-field">'
        + '<label>Image Height</label>'
        + '<input class="brand-image-height" type="number" min="1" step="1" value="' + (displayConfig && displayConfig.height ? displayConfig.height : '') + '" placeholder="40">'
        + '</div>'
        + '</div>'
        + '<div class="serial-error"></div>'
        + '</div>'
        + '<div class="table-wrap">'
        + '<table>'
        + '<thead><tr><th>Model</th><th>RAM Storage</th><th>Color</th><th>Price</th><th>Online Price</th><th>Stock</th><th>Action</th></tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table>'
        + '</div>';

      const tbody = card.querySelector('tbody');
      card.querySelector('.add-row-btn').addEventListener('click', () => {
        tbody.insertAdjacentHTML('beforeend', buildRowHtml({}));
      });

      card.querySelector('.remove-brand-btn').addEventListener('click', () => {
        card.remove();
        validateBrandSerials();
      });

      const serialInput = card.querySelector('.brand-serial-input');
      serialInput.addEventListener('input', () => {
        validateBrandSerials();
      });

      tbody.addEventListener('click', event => {
        if (event.target.classList.contains('row-remove-btn')) {
          const row = event.target.closest('tr');
          if (row) row.remove();
          return;
        }

        if (event.target.classList.contains('row-up-btn')) {
          const row = event.target.closest('tr');
          const prev = row ? row.previousElementSibling : null;
          if (row && prev) {
            tbody.insertBefore(row, prev);
          }
          return;
        }

        if (event.target.classList.contains('row-down-btn')) {
          const row = event.target.closest('tr');
          const next = row ? row.nextElementSibling : null;
          if (row && next) {
            tbody.insertBefore(next, row);
          }
        }
      });

      return card;
    }

    function getSerialValue(rawValue) {
      const trimmed = String(rawValue || '').trim();
      if (!trimmed) return null;
      if (!/^\d+$/.test(trimmed)) return NaN;
      const parsed = Number(trimmed);
      if (!Number.isInteger(parsed) || parsed <= 0) return NaN;
      return parsed;
    }

    function clearSerialErrors() {
      const cards = Array.from(brandContainerEl.querySelectorAll('.brand-card'));
      cards.forEach(card => {
        const serialInput = card.querySelector('.brand-serial-input');
        const serialError = card.querySelector('.serial-error');
        if (serialInput) {
          serialInput.classList.remove('serial-invalid');
        }
        if (serialError) {
          serialError.textContent = '';
        }
      });
    }

    function setSerialError(card, message) {
      const serialInput = card.querySelector('.brand-serial-input');
      const serialError = card.querySelector('.serial-error');
      if (serialInput) {
        serialInput.classList.add('serial-invalid');
      }
      if (serialError) {
        serialError.textContent = message;
      }
    }

    function validateBrandSerials() {
      clearSerialErrors();

      const cards = Array.from(brandContainerEl.querySelectorAll('.brand-card'));
      const serialToCard = new Map();
      let valid = true;

      cards.forEach(card => {
        const serialInput = card.querySelector('.brand-serial-input');
        const serial = getSerialValue(serialInput ? serialInput.value : '');

        if (serial === null) return;

        if (Number.isNaN(serial)) {
          valid = false;
          setSerialError(card, 'Serial must be a positive whole number.');
          return;
        }

        if (serialToCard.has(serial)) {
          valid = false;
          const existingCard = serialToCard.get(serial);
          setSerialError(existingCard, 'Serial ' + serial + ' is already used.');
          setSerialError(card, 'Serial ' + serial + ' is already used.');
          return;
        }

        serialToCard.set(serial, card);
      });

      return valid;
    }

    function getNextBrandSerial() {
      const cards = Array.from(brandContainerEl.querySelectorAll('.brand-card'));
      const serialSet = new Set();

      cards.forEach(card => {
        const serialInput = card.querySelector('.brand-serial-input');
        const serial = getSerialValue(serialInput ? serialInput.value : '');
        if (Number.isInteger(serial) && serial > 0) {
          serialSet.add(serial);
        }
      });

      let next = 1;
      while (serialSet.has(next)) {
        next += 1;
      }
      return next;
    }

    function assignMissingSerialsToCards() {
      const cards = Array.from(brandContainerEl.querySelectorAll('.brand-card'));
      const serialSet = new Set();

      cards.forEach(card => {
        const serialInput = card.querySelector('.brand-serial-input');
        const serial = getSerialValue(serialInput ? serialInput.value : '');
        if (Number.isInteger(serial) && serial > 0 && !serialSet.has(serial)) {
          serialSet.add(serial);
        }
      });

      cards.forEach(card => {
        const serialInput = card.querySelector('.brand-serial-input');
        const serial = getSerialValue(serialInput ? serialInput.value : '');
        if (Number.isInteger(serial) && serial > 0 && !serialSet.has(serial)) {
          serialSet.add(serial);
          return;
        }

        if (serial === null) {
          let next = 1;
          while (serialSet.has(next)) {
            next += 1;
          }
          if (serialInput) {
            serialInput.value = String(next);
          }
          serialSet.add(next);
        }
      });
    }

    function sortBrandsBySerial(brandKeys, metaSerial, fallbackOrder) {
      const orderIndex = new Map(fallbackOrder.map((brand, index) => [brand, index]));
      const parsedSerial = brand => {
        const raw = metaSerial ? metaSerial[brand] : null;
        const value = Number(raw);
        return Number.isInteger(value) && value > 0 ? value : null;
      };

      return brandKeys.slice().sort((a, b) => {
        const aSerial = parsedSerial(a);
        const bSerial = parsedSerial(b);

        if (aSerial !== null && bSerial !== null) {
          if (aSerial !== bSerial) return aSerial - bSerial;
        } else if (aSerial !== null) {
          return -1;
        } else if (bSerial !== null) {
          return 1;
        }

        const aIdx = orderIndex.has(a) ? orderIndex.get(a) : Number.MAX_SAFE_INTEGER;
        const bIdx = orderIndex.has(b) ? orderIndex.get(b) : Number.MAX_SAFE_INTEGER;
        if (aIdx !== bIdx) return aIdx - bIdx;
        return a.localeCompare(b);
      });
    }

    function renderBrandForm(latestData) {
      brandContainerEl.innerHTML = '';
      const metaOrder = Array.isArray(latestData && latestData.__meta && latestData.__meta.brandOrder)
        ? latestData.__meta.brandOrder
        : [];
      const metaSerial = latestData && latestData.__meta && typeof latestData.__meta.brandSerial === 'object'
        ? latestData.__meta.brandSerial
        : {};
      const metaDisplay = latestData && latestData.__meta && typeof latestData.__meta.brandDisplay === 'object'
        ? latestData.__meta.brandDisplay
        : {};
      const rawBrandKeys = Object.keys(latestData || {}).filter(key => !key.startsWith('__'));
      const fallbackOrderedKeys = [
        ...metaOrder.filter(brand => rawBrandKeys.includes(brand)),
        ...rawBrandKeys.filter(brand => !metaOrder.includes(brand))
      ];
      const orderedBrandKeys = sortBrandsBySerial(fallbackOrderedKeys, metaSerial, fallbackOrderedKeys);

      orderedBrandKeys.forEach(brand => {
        const displayConfig = getBrandDisplayConfig(brand, metaDisplay);
        const card = createBrandCard(brand, latestData[brand], metaSerial[brand], displayConfig);
        brandContainerEl.appendChild(card);
      });

      if (!orderedBrandKeys.length) {
        const emptyCard = createBrandCard('new-brand', [{}], 1, { imageUrl: '', width: null, height: null });
        brandContainerEl.appendChild(emptyCard);
      }

      assignMissingSerialsToCards();
      validateBrandSerials();
    }

    function collectFormPayload() {
      const payload = {};
      const brandCards = Array.from(brandContainerEl.querySelectorAll('.brand-card'));
      const brandSerial = {};
      const brandDisplay = {};
      const brandEntries = [];

      brandCards.forEach(card => {
        const brand = normalizeText(card.dataset.brand).toLowerCase();
        if (!brand) return;

        const serialInput = card.querySelector('.brand-serial-input');
        const serial = getSerialValue(serialInput ? serialInput.value : '');
        if (Number.isInteger(serial) && serial > 0) {
          brandSerial[brand] = serial;
        }

        const imageUrl = normalizeText(card.querySelector('.brand-image-url').value);
        const imageWidth = normalizePositiveInt(card.querySelector('.brand-image-width').value);
        const imageHeight = normalizePositiveInt(card.querySelector('.brand-image-height').value);

        brandDisplay[brand] = {
          imageUrl,
          width: imageWidth,
          height: imageHeight
        };

        const rows = Array.from(card.querySelectorAll('.item-row'));
        const items = rows.map(row => {
          const model = normalizeText(row.querySelector('[data-field="model"]').value);
          const ramStorage = normalizeText(row.querySelector('[data-field="ram_storage"]').value);
          const color = normalizeText(row.querySelector('[data-field="color"]').value);
          const price = normalizeNumber(row.querySelector('[data-field="price"]').value);
          const onlinePrice = normalizeNumber(row.querySelector('[data-field="online_price"]').value);
          const stock = normalizeText(row.querySelector('[data-field="stock"]').value) || 'In Stock';

          return {
            model,
            ram_storage: ramStorage,
            color,
            price,
            online_price: onlinePrice,
            stock
          };
        }).filter(item => !isRowEmpty(item));

        payload[brand] = items;
        brandEntries.push({ brand, serial });
      });

      const orderedBySerial = brandEntries
        .slice()
        .sort((a, b) => {
          const aValid = Number.isInteger(a.serial) && a.serial > 0;
          const bValid = Number.isInteger(b.serial) && b.serial > 0;
          if (aValid && bValid && a.serial !== b.serial) return a.serial - b.serial;
          if (aValid && !bValid) return -1;
          if (!aValid && bValid) return 1;
          return a.brand.localeCompare(b.brand);
        })
        .map(entry => entry.brand);

      payload.__meta = {
        brandOrder: orderedBySerial,
        brandSerial,
        brandDisplay
      };

      return payload;
    }

    if (!isFirebaseConfigured()) {
      setStatus('Firebase config is missing. Update firebase-config.js first.', true);
    } else {
      if (!firebase.apps.length) {
        firebase.initializeApp(window.firebaseConfig);
      }

      const db = firebase.database();
      const dbPath = window.firebaseDatabasePath || 'priceListData';
      const rootRef = db.ref(dbPath);

      function openDeleteModal() {
        deleteModalEl.classList.add('open');
        deleteModalEl.setAttribute('aria-hidden', 'false');
      }

      function closeDeleteModal() {
        deleteModalEl.classList.remove('open');
        deleteModalEl.setAttribute('aria-hidden', 'true');
      }

      function populateDeleteDates(payload) {
        const dates = Object.keys(payload || {}).sort().reverse();
        deleteDateSelectEl.innerHTML = '';

        dates.forEach(date => {
          const option = document.createElement('option');
          option.value = date;
          option.textContent = date;
          deleteDateSelectEl.appendChild(option);
        });

        if (newDateEl.value && dates.includes(newDateEl.value)) {
          deleteDateSelectEl.value = newDateEl.value;
        }
      }

      function populateDeleteTimes(payload, selectedDate) {
        const dateData = payload[selectedDate] || {};
        const times = Object.keys(dateData);
        const sortedTimes = sortTimesDescending(times);

        deleteTimeSelectEl.innerHTML = '';
        sortedTimes.forEach(time => {
          const option = document.createElement('option');
          option.value = time;
          option.textContent = time;
          deleteTimeSelectEl.appendChild(option);
        });

        if (newTimeEl.value && sortedTimes.includes(newTimeEl.value.trim())) {
          deleteTimeSelectEl.value = newTimeEl.value.trim();
        }
      }

      async function loadLatest() {
        try {
          setStatus('Loading latest data...', false);
          const snapshot = await rootRef.get();
          const payload = snapshot.exists() ? snapshot.val() : {};
          lastSnapshotData = payload;

          const latestDate = getLatestDateKey(payload);
          if (!latestDate) {
            latestDateEl.value = '';
            latestTimeEl.value = '';
            renderBrandForm({});
            setStatus('No data found under selected Firebase path.', true);
            return;
          }

          const latestTime = getLatestTimeKey(payload, latestDate);
          if (!latestTime) {
            latestDateEl.value = latestDate;
            latestTimeEl.value = '';
            renderBrandForm({});
            setStatus('Latest date exists but no time entry found.', true);
            return;
          }

          latestDateEl.value = latestDate;
          latestTimeEl.value = latestTime;

          const latestData = payload[latestDate][latestTime] || {};
          renderBrandForm(latestData);

          if (!newDateEl.value) {
            const today = new Date(Date.now() - new Date().getTimezoneOffset() * 60000)
              .toISOString()
              .split('T')[0];
            newDateEl.value = today;
          }

          setStatus('Latest data loaded. Edit in form and publish to new date/time.', false);
        } catch (error) {
          setStatus('Failed to load data: ' + (error.message || String(error)), true);
        }
      }

      async function publishNew() {
        try {
          const newDate = newDateEl.value;
          const newTime = newTimeEl.value.trim();

          if (!newDate) {
            setStatus('Please select New Date.', true);
            return;
          }

          if (!newTime) {
            setStatus('Please enter New Time.', true);
            return;
          }

          if (!convertTo24Hour(newTime)) {
            setStatus('New Time must be in format like 08:00 AM.', true);
            return;
          }

          assignMissingSerialsToCards();

          if (!validateBrandSerials()) {
            setStatus('Please fix serial number errors before publish.', true);
            return;
          }

          const newPayload = collectFormPayload();
          if (!Object.keys(newPayload).length) {
            setStatus('No brand data to publish. Add at least one brand and row.', true);
            return;
          }

          const targetRef = rootRef.child(newDate).child(newTime);
          const existingSnapshot = await targetRef.get();
          if (existingSnapshot.exists()) {
            const shouldOverwrite = window.confirm(
              'Data already exists for ' + newDate + ' / ' + newTime + '. Do you want to overwrite it?'
            );

            if (!shouldOverwrite) {
              setStatus('Publish cancelled. Existing data was not changed.', true);
              return;
            }
          }

          setStatus('Publishing new data...', false);
          await targetRef.set(newPayload);

          latestDateEl.value = newDate;
          latestTimeEl.value = newTime;
          setStatus('Published successfully to ' + newDate + ' / ' + newTime, false);
        } catch (error) {
          setStatus('Failed to publish: ' + (error.message || String(error)), true);
        }
      }

      async function deleteSelected() {
        try {
          const snapshot = await rootRef.get();
          const payload = snapshot.exists() ? snapshot.val() : {};
          lastSnapshotData = payload;

          const availableDates = Object.keys(payload || {});
          if (!availableDates.length) {
            setStatus('No data available to delete.', true);
            return;
          }

          populateDeleteDates(payload);
          const selectedDate = deleteDateSelectEl.value;
          populateDeleteTimes(payload, selectedDate);

          openDeleteModal();
        } catch (error) {
          setStatus('Failed to open delete options: ' + (error.message || String(error)), true);
        }
      }

      async function confirmDeleteSelected() {
        try {
          const targetDate = deleteDateSelectEl.value;
          const targetTime = deleteTimeSelectEl.value;

          if (!targetDate || !targetTime) {
            setStatus('Please select date and time to delete.', true);
            return;
          }

          const targetRef = rootRef.child(targetDate).child(targetTime);
          const snapshot = await targetRef.get();

          if (!snapshot.exists()) {
            setStatus('Selected data no longer exists. Refresh and try again.', true);
            closeDeleteModal();
            await loadLatest();
            return;
          }

          const shouldDelete = window.confirm(
            'Are you sure you want to delete data for ' + targetDate + ' / ' + targetTime + '?'
          );

          if (!shouldDelete) {
            setStatus('Delete cancelled.', true);
            return;
          }

          await targetRef.remove();

          // Remove empty date node after deleting time node
          const dateRef = rootRef.child(targetDate);
          const dateSnapshot = await dateRef.get();
          const remaining = dateSnapshot.exists() ? dateSnapshot.val() : null;
          if (!remaining || !Object.keys(remaining).length) {
            await dateRef.remove();
          }

          closeDeleteModal();
          newDateEl.value = targetDate;
          newTimeEl.value = targetTime;
          setStatus('Deleted successfully: ' + targetDate + ' / ' + targetTime, false);
          await loadLatest();
        } catch (error) {
          setStatus('Failed to delete: ' + (error.message || String(error)), true);
        }
      }

      document.getElementById('loadBtn').addEventListener('click', loadLatest);
      document.getElementById('publishBtn').addEventListener('click', publishNew);
      document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
      deleteDateSelectEl.addEventListener('change', () => {
        populateDeleteTimes(lastSnapshotData, deleteDateSelectEl.value);
      });
      closeDeleteModalBtn.addEventListener('click', closeDeleteModal);
      confirmDeleteBtn.addEventListener('click', confirmDeleteSelected);
      deleteModalEl.addEventListener('click', event => {
        if (event.target === deleteModalEl) {
          closeDeleteModal();
        }
      });
      addBrandBtn.addEventListener('click', () => {
        const name = window.prompt('Enter brand name (example: iphone, samsung):');
        const brand = normalizeText(name).toLowerCase();
        if (!brand) return;

        const existing = Array.from(brandContainerEl.querySelectorAll('.brand-card'))
          .some(card => normalizeText(card.dataset.brand).toLowerCase() === brand);
        if (existing) {
          setStatus('Brand already exists: ' + brand, true);
          return;
        }

        const card = createBrandCard(brand, [{}], getNextBrandSerial(), { imageUrl: '', width: null, height: null });
        brandContainerEl.appendChild(card);
        assignMissingSerialsToCards();
        validateBrandSerials();
      });

      loadLatest();
    }
  </script>
</body>
